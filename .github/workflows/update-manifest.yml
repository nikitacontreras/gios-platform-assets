name: Update Assets Manifest

on:
  push:
    paths:
      - 'sdk/**'
      - 'ddi/**'
      - 'gen_manifest.go'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache compressed assets
        uses: actions/cache@v4
        with:
          path: |
            sdk/**/*.tar.xz
            sdk/**/*.tar.xz.signature
            ddi/**/*.signature
          key: assets-cache-${{ hashFiles('sdk/**/*.sdk', 'ddi/**/*.zip') }}
          restore-keys: |
            assets-cache-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Compress SDKs & Sign DDIs
        run: |
          echo "Processing SDKs..."
          find sdk -name "*.sdk" -type d | while read dir; do
            if [ ! -f "${dir}.tar.xz" ]; then
              tar -cJf "${dir}.tar.xz" -C "$(dirname "${dir}")" "$(basename "${dir}")"
            fi
            md5sum "${dir}.tar.xz" | awk '{print $1}' > "${dir}.tar.xz.signature"
          done

          echo "Signing DDIs..."
          find ddi -name "*.zip" -type f | while read file; do
            md5sum "$file" | awk '{print $1}' > "${file}.signature"
          done

      - name: Generate Manifest
        run: go run gen_manifest.go

      - name: Commit assets.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update assets.json manifest [skip ci]"
          file_pattern: 'assets.json'

      - name: Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            sdk/**/*.tar.xz
            sdk/**/*.tar.xz.signature
            ddi/**/*.zip
            ddi/**/*.signature
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
