name: Update Assets Manifest

on:
  push:
    paths:
      - 'sdk/**'
      - 'ddi/**'
      - 'gen_manifest.go'
      - '.github/workflows/update-manifest.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Cache compressed assets
        uses: actions/cache@v4
        with:
          path: |
            sdk/**/*.tar.xz
            sdk/**/*.tar.xz.signature
            ddi/**/*.signature
          key: assets-cache-${{ hashFiles('sdk/**/*.sdk', 'ddi/**/*.zip') }}
          restore-keys: |
            assets-cache-

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Compress SDKs & Sign DDIs
        run: |
          # Detect number of cores
          CORES=$(nproc)
          echo "Using $CORES parallel jobs..."

          echo "Processing SDKs in parallel..."
          # Define worker function for SDKs
          process_sdk() {
            dir="$1"
            if [ ! -f "${dir}.tar.xz" ]; then
              echo "Comprimiendo $dir..."
              tar -cJf "${dir}.tar.xz" -C "$(dirname "${dir}")" "$(basename "${dir}")"
            fi
            md5sum "${dir}.tar.xz" | awk '{print $1}' > "${dir}.tar.xz.signature"
          }
          export -f process_sdk
          find sdk -name "*.sdk" -type d | xargs -P "$CORES" -I {} bash -c 'process_sdk "{}"'

          echo "Signing DDIs in parallel..."
          # Define worker function for DDIs
          sign_ddi() {
            file="$1"
            echo "Firmando $file..."
            md5sum "$file" | awk '{print $1}' > "${file}.signature"
          }
          export -f sign_ddi
          find ddi -name "*.zip" -type f | xargs -P "$CORES" -I {} bash -c 'sign_ddi "{}"'

      - name: Generate Manifest
        run: go run gen_manifest.go

      - name: Commit assets.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: update assets.json manifest [skip ci]"
          file_pattern: 'assets.json'

      - name: Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Preparing assets for 'latest' release..."
          
          # Ensure release exists and is PUBLISHED (not draft)
          if ! gh release view latest >/dev/null 2>&1; then
            echo "Creating new release..."
            gh release create latest --title "Latest Assets" --notes "Automated asset update"
          else
            echo "Ensuring existing release is published..."
            gh release edit latest --draft=false
          fi
          
          # Find all files and upload them handling spaces correctly
          find sdk ddi -type f \( -name "*.tar.xz" -o -name "*.tar.xz.signature" -o -name "*.zip" -o -name "*.signature" \) -print0 | xargs -0 -P 4 -I {} sh -c 'echo "Uploading {}..."; gh release upload latest "{}" --clobber'



